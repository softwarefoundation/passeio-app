<div class="p-6 max-w-lg mx-auto bg-white rounded-xl shadow-lg mt-6">
    <h2 class="text-2xl font-semibold text-gray-700 mg-4">Nova Categoria</h2>

    <form id="categoriaForm" [formGroup]="camposForm" (ngSubmit)="salvar()" class="space-y-4">
        <div class="mb-4">
            <!--Campo nome-->
            <label for="nome" class="block text-gray-600 font-medium mb-2">Nome</label>
            <input type="text"
                   id="nome"
                   name="nome"
                   formControlName="nome"
                   class="w-full p-3 border border-green-300 rounded  shadow-sm focus:ring  focus:ring-blue-400"
                   placeholder="Ex: Restaurantes, Praias, Shopping">
            <span class="text-red-500 text-sm">Campo obrigatório</span>
        </div>
        <div class="mb-4">
            <!--Campo descrição-->
            <label for="descricao" class="block text-gray-600 font-medium mb-2">Descrição</label>
            <textarea type="text"
                      id="descricao"
                      name="descricao"
                      formControlName="descricao"
                      rows="4"
                      class="w-full p-3 border border-green-300 rounded  shadow-sm focus:ring focus:outline-none  focus:ring-blue-400"
                      placeholder="Ex: Restaurantes, Praias, Shopping"
                      required>
            </textarea>
            <span class="text-red-500 text-sm">Campo obrigatório</span>
        </div>

        <button type="submit"
                class="w-full bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-600 transition duration-300">
            Cadastrar Categoria
        </button>

    </form>
</div>
